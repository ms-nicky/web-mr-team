<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mr Team</title>
  <meta name="description" content="Login ke panel Mr Team">
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/png" href="assets/MrTeam.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Orbitron:wght@500;700;800;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Background layers -->
  <div class="bg-mesh" aria-hidden="true"></div>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>

  <!-- ───── HEADER ───── -->
  <header class="topbar">
    <a class="brand" href="/">
      <img src="assets/MrTeam.png" alt="Logo Mr Team" width="40" height="40" decoding="async">
      <span>Mr Team</span>
      <div class="brand-dot" aria-hidden="true"></div>
    </a>
    <nav aria-label="Navigasi utama">
      <a href="/">Home</a>
      <a href="/#focus">Focus</a>
      <a href="/#members">Members</a>
      <a href="/#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section class="login-section">
      <div class="login-box">
        <div class="login-header">
          <div class="login-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h1>Akses Panel</h1>
          <p>Masuk ke sistem untuk mengelola akses dan aktivitas team.</p>
        </div>

        <form id="login-form" class="login-form" method="post">
          <div class="login-field">
            <label for="login-username">Username</label>
            <input id="login-username" name="username" type="text" placeholder="Masukkan username" required autocomplete="username">
          </div>
          <div class="login-field">
            <label for="login-password">Password</label>
            <input id="login-password" name="password" type="password" placeholder="Masukkan password" required autocomplete="current-password">
          </div>
          <div class="login-options">
            <label class="login-checkbox">
              <input type="checkbox" name="remember">
              <span>Ingat saya</span>
            </label>
          </div>
          <button class="btn btn-primary login-btn" type="submit">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
              <polyline points="10 17 15 12 10 7"/>
              <line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Masuk
          </button>
          <p id="login-feedback" class="login-feedback"></p>
        </form>

        <div class="login-footer">
          <p>&copy; <span id="year">2026</span> Mr Team &mdash; Developer &amp; Cyber Security Unit</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/login.js"></script>
</body>

</html>
